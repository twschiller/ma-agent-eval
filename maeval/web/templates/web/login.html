{% extends "web/base.html" %}

{% block title %}Log in &middot; MA Agent Eval{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Log in</h1>
<form method="post" class="col-md-6">
  {% csrf_token %}
  {% include "web/_form_fields.html" %}
  <input type="hidden" name="next" value="{{ next }}">
  <button type="submit" class="btn btn-primary">Log in</button>
  <a class="btn btn-outline-secondary" href="{% url 'web:signup' %}">Create an account</a>
</form>
{% endblock %}
