# tach.toml — enforce intra-app layering: views → schemas → models.
# Lower layers must not import higher ones. `common` is a utility module,
# importable from anywhere. Django Ninja routers live in `views.py` and are
# mounted centrally in `config/api.py`, so there is no per-app `urls` layer.
# Run `uv run tach check` (wired into pre-commit + CI).
# Regenerate/scaffold after adding apps: `uv run tach mod`.

[[modules]]
path = "maeval.common"
depends_on = []
utility = true

[[modules]]
path = "maeval.accounts.models"
depends_on = ["maeval.common"]

[[modules]]
path = "maeval.accounts.schemas"
depends_on = ["maeval.accounts.models"]

[[modules]]
path = "maeval.accounts.auth"
depends_on = ["maeval.accounts.models"]

[[modules]]
path = "maeval.accounts.views"
depends_on = ["maeval.accounts.schemas", "maeval.accounts.auth", "maeval.accounts.models"]

[[modules]]
path = "maeval.submissions.models"
depends_on = ["maeval.common"]

[[modules]]
path = "maeval.submissions.schemas"
depends_on = ["maeval.submissions.models"]

[[modules]]
path = "maeval.submissions.views"
depends_on = [
    "maeval.submissions.schemas",
    "maeval.submissions.models",
    # The write path authenticates principals and enforces API-key scopes via
    # the accounts auth contract.
    "maeval.accounts.auth",
    "maeval.accounts.models",
]

[[modules]]
path = "maeval.traces.models"
depends_on = ["maeval.common", "maeval.submissions.models"]

[[modules]]
path = "maeval.traces.schemas"
depends_on = ["maeval.traces.models"]

[[modules]]
path = "maeval.traces.views"
depends_on = [
    "maeval.traces.schemas",
    "maeval.traces.models",
    # A trace is recorded against a submission, and the write path authenticates
    # principals and enforces API-key scopes via the accounts auth contract.
    "maeval.submissions.models",
    "maeval.accounts.auth",
    "maeval.accounts.models",
]

[cache]
backend = "disk"
